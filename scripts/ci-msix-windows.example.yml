# Example GitHub Actions snippet — adapt secrets, certificate format, and Flutter channel.
# Microsoft Store: you often upload an MSIX built with --store; Partner Center may re-sign.
# Side-load: sign with a .pfx using signtool or msix_config certificate_path in pubspec.

name: windows-msix-example

on:
  workflow_dispatch:

jobs:
  msix:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build MSIX
        working-directory: app
        env:
          # Optional: inject side-load cert without committing .pfx (unwrap base64 to file in a prior step).
          # MSIX_CERTIFICATE_PASSWORD: ${{ secrets.MSIX_PFX_PASSWORD }}
          CI: true
        run: |
          flutter pub get
          flutter build windows --release
          dart run msix:create

      - uses: actions/upload-artifact@v4
        with:
          name: msix-package
          path: |
            app/build/windows/**/*.msix
            app/**/*.msix
